# _data/traveller-tools.yml
# ─────────────────────────────────────────────────────────
# Each entry drives a tool card on /traveller.
# Fields:
#   title       — Card heading
#   subtitle    — Small subtext (what it does, briefly)
#   description — Longer paragraph shown in the card
#   icon        — Font Awesome class e.g. "fa fa-globe"
#   category    — Optional grouping header (e.g. "World Building")
#   url         — Link to the running tool (can be a page, tool embed, etc.)
#   repo        — Optional GitHub link
#   tags        — List of short labels
# ─────────────────────────────────────────────────────────

- title: Planet Handout Generator
  subtitle: UWP · Planet · Handout 
  description: >
    Generate random or manual Planet Handouts with UWP codes and basic system details using MgT 2e rules.
  icon: fa fa-globe
  category: World Building
  url: /tools/planet-handout
  repo: https://github.com/gguixe/traveller-planet-handout
  tags: [UWP, Planet, Sandbox]

