{% assign project = include.project %}
<figure class="effect-bubba wide-project" data-modal-target="modal-{{ project.id }}">
  <img src="{{ site.baseurl }}/{{ project.image }}" alt="{{ project.title }}" loading="lazy">
  <figcaption>
    <h2>{{ project.title }}</h2>
    <p>{{ project.description }}</p>
    <a href="#" onclick="event.preventDefault();">View more</a>
  </figcaption>
  {% include projects/icon-links.html links=project.links %}
</figure>
